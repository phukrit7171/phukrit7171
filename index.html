<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="scripts/tailwind-config.js"></script>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body class="text-white circuit-board-background">
    <div class="grid-overlay"></div>
    <div class="particles" id="particles"></div>
    
    <header class="hidden md:flex fixed top-0 w-full z-50 nav-glass border-b border-cyber-primary border-opacity-20">
        <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 id="header-title" class="text-2xl font-orbitron neon-text glow-text tracking-wider"></h1>
            <ul id="desktop-nav-links" class="flex space-x-10">
                <!-- Nav links will be dynamically inserted here -->
            </ul>
        </nav>
    </header>
    
    <header class="md:hidden fixed top-0 w-full z-50 nav-glass border-b border-cyber-primary border-opacity-20 ">
        <nav class="container mx-auto px-4 py-4 flex justify-between items-center">
            <h1 id="mobile-header-title" class="text-xl font-orbitron neon-text glow-text tracking-wider"></h1>
            <button id="mobile-menu-button" class="text-cyber-primary hamburger-icon hidden" aria-label="Toggle mobile menu">
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
                <span class="hamburger-line"></span>
            </button>
        </nav>
    </header>
    
    <aside id="mobile-overlay" class="mobile-overlay" role="dialog" aria-hidden="true">
        <div class="mobile-content">
            <button class="close-mobile-menu" id="close-mobile-menu" aria-label="Close menu">
                <i class="fas fa-times"></i>
            </button>
            <ul id="mobile-nav-links" class="mobile-nav-links">
                <!-- Mobile nav links will be dynamically inserted here -->
            </ul>
        </div>
    </aside>
    
    <main>
        <section id="home" class="min-h-screen flex items-center hero-padding pt-16">
            <div class="container mx-auto px-4">
                <article class="flex flex-col lg:flex-row items-center">
                    <div class="lg:w-1/2 mb-16 lg:mb-0">
                        <h1 id="hero-main-heading" class="text-4xl md:text-6xl lg:text-7xl font-orbitron mb-6 neon-text glow-text"></h1>
                        <h2 id="hero-sub-heading" class="text-xl md:text-2xl lg:text-3xl font-exo mb-6 neon-text-secondary tracking-wide"></h2>
                        <p id="hero-description" class="text-lg md:text-xl mb-8 max-w-lg leading-relaxed"></p>
                        <div id="hero-buttons-container" class="flex flex-col sm:flex-row space-y-4 sm:space-y-0 sm:space-x-6">
                            <!-- Buttons will be dynamically inserted here -->
                        </div>
                    </div>
                    <figure class="lg:w-1/2 flex justify-center">
                        <div class="relative hero-glass rounded-full p-6 md:p-8">
                            <div class="w-48 h-48 md:w-64 md:h-64 lg:w-80 lg:h-80 rounded-full bg-gradient-to-r from-cyber-primary to-cyber-secondary opacity-5 floating-element"></div>
                            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-40 h-40 md:w-56 md:h-56 lg:w-72 lg:h-72 rounded-full border-4 border-cyber-primary animate-float"></div>
                            <div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-5xl md:text-7xl lg:text-8xl">👨‍💻</div>
                        </div>
                    </figure>
                </article>
            </div>
        </section>
        
        <section id="about" class="section-padding">
            <div class="container mx-auto px-4">
                <header class="text-center mb-12 lg:mb-20">
                    <h2 id="about-heading" class="text-3xl md:text-4xl lg:text-5xl font-orbitron neon-text"></h2>
                </header>
                <article class="liquid-glass glass-effect rounded-2xl p-6 md:p-8 lg:p-12 max-w-4xl lg:max-w-5xl mx-auto">
                    <div class="liquid-content">
                        <div class="scan-line"></div>
                        <div class="flex flex-col lg:flex-row gap-8 lg:gap-12 items-center">
                            <figure class="lg:w-2/5 flex justify-center">
                                <div class="w-32 h-32 md:w-40 md:h-40 lg:w-48 lg:h-48 rounded-full bg-gradient-to-r from-cyber-primary to-cyber-secondary opacity-50 flex items-center justify-center">
                                    <div class="w-28 h-28 md:w-36 md:h-36 lg:w-40 lg:h-40 rounded-full border-4 border-cyber-primary flex items-center justify-center">
                                        <img src="https://avatars.githubusercontent.com/u/64061607?s=400&u=9f82546c4d9fd18a70081bb0ec5f30a8d38966de&v=4" alt="Mr.Phukrit Kittinontana" id="about-image" class="w-full h-full rounded-full object-cover z-auto">
                                    </div>
                                </div>
                            </figure>
                            <div class="lg:w-3/5">
                                <h3 id="about-sub-heading" class="text-xl md:text-2xl lg:text-3xl font-orbitron mb-4 md:mb-6 neon-text-secondary"></h3>
                                <div id="about-paragraphs">
                                    <!-- Paragraphs will be dynamically inserted here -->
                                </div>
                                <div id="about-details" class="grid grid-cols-1 sm:grid-cols-2 gap-4 md:gap-6">
                                    <!-- Details will be dynamically inserted here -->
                                </div>
                            </div>
                        </div>
                    </div>
                </article>
            </div>
        </section>
        
        <section id="skills" class="section-padding bg-black bg-opacity-20">
            <div class="container mx-auto px-4">
                <header class="text-center mb-12 lg:mb-20">
                    <h2 id="skills-heading" class="text-3xl md:text-4xl lg:text-5xl font-orbitron neon-text"></h2>
                </header>
                <article class="grid grid-cols-1 lg:grid-cols-2 gap-6 md:gap-8 max-w-4xl lg:max-w-5xl mx-auto">
                    <section class="liquid-glass glass-effect rounded-2xl p-6 md:p-8">
                        <div class="liquid-content">
                            <div class="scan-line"></div>
                            <h3 id="frontend-skills-title" class="text-xl md:text-2xl font-orbitron mb-4 md:mb-6 neon-text-secondary"></h3>
                            <div id="frontend-skills-container" class="space-y-4 md:space-y-6">
                                <!-- Frontend skills will be dynamically inserted here -->
                            </div>
                        </div>
                    </section>
                    <section class="liquid-glass glass-effect rounded-2xl p-6 md:p-8">
                        <div class="liquid-content">
                            <div class="scan-line"></div>
                            <h3 id="backend-skills-title" class="text-xl md:text-2xl font-orbitron mb-4 md:mb-6 neon-text-secondary"></h3>
                            <div id="backend-skills-container" class="space-y-4 md:space-y-6">
                                <!-- Backend skills will be dynamically inserted here -->
                            </div>
                        </div>
                    </section>
                </article>
            </div>
        </section>

        <section id="projects" class="section-padding hidden">
            <div class="container mx-auto px-4">
                <header class="text-center mb-12 lg:mb-20">
                    <h2 id="projects-heading" class="text-3xl md:text-4xl lg:text-5xl font-orbitron neon-text"></h2>
                </header>
                <article id="projects-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-8 max-w-6xl mx-auto">
                     <!-- Project cards will be dynamically inserted here  -->
                </article>
            </div>
        </section>        
       
       
        <section id="contact" class="section-padding bg-black bg-opacity-20 hidden">
            <div class="container mx-auto px-4">
                <header class="text-center mb-12 lg:mb-20">
                    <h2 id="contact-heading" class="text-3xl md:text-4xl lg:text-5xl font-orbitron neon-text"></h2>
                </header>
                <article class="liquid-glass glass-effect rounded-2xl p-6 md:p-8 lg:p-12 max-w-3xl mx-auto">
                    <div class="liquid-content">
                        <div class="scan-line"></div>
                        <form class="space-y-6 md:space-y-8">
                            <div>
                                <label id="contact-name-label" class="block mb-2 md:mb-3 neon-text-secondary text-base md:text-lg"></label>
                                <input type="text" class="w-full px-4 py-3 md:px-6 md:py-4 form-input text-base md:text-lg" required placeholder="Enter your name">
                            </div>
                            <div>
                                <label id="contact-email-label" class="block mb-2 md:mb-3 neon-text-secondary text-base md:text-lg"></label>
                                <input type="email" class="w-full px-4 py-3 md:px-6 md:py-4 form-input text-base md:text-lg" required placeholder="Enter your email">
                            </div>
                            <div>
                                <label id="contact-message-label" class="block mb-2 md:mb-3 neon-text-secondary text-base md:text-lg"></label>
                                <textarea rows="5" class="w-full px-4 py-3 md:px-6 md:py-4 form-input text-base md:text-lg" required placeholder="Type your message"></textarea>
                            </div>
                            <button id="contact-submit-button" type="submit" class="w-full py-3 md:py-4 bg-cyber-primary text-cyber-dark font-bold rounded-lg neon-button text-base md:text-lg">
                            </button>
                        </form>
                    </div>
                </article>
            </div>
        </section> 
    </main>
    
    <footer class="py-8 md:py-12 border-t border-cyber-primary border-opacity-20">
        <div class="container mx-auto px-4 text-center">
            <div id="footer-social-links" class="flex justify-center space-x-6 md:space-x-8 mb-6">
                <!-- Social links will be dynamically inserted here -->
            </div>
            <p id="footer-copyright" class="neon-text text-base md:text-lg"></p>
        </div>
    </footer>

    <script type="module" src="scripts/main.js"></script>
</body>
</html>
